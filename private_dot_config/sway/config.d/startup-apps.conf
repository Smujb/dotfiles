# swaywsr
exec swaywsr

# autotiling-rs
exec autotiling-rs

# Run startup applications
exec --no-startup-id flatpak run io.gitlab.librewolf-community
exec --no-startup-id flatpak run dev.vencord.Vesktop
exec --no-startup-id flatpak run org.mozilla.thunderbird
exec --no-startup-id flatpak run ch.protonmail.protonmail-bridge --no-window

# Tray apps
exec --no-startup-id flatpak run pw.mmk.OpenFreebuds
exec --no-startup-id flatpak run io.github.tobagin.karere

# Special key to take a screenshot with Slurp + Grim + Still
bindsym $mod+Shift+s exec still -c 'grim -g "$(slurp)" -t png - | wl-copy -t image/png'

# Pick a colour with grimpicker
bindsym $mod+Shift+p exec grimpicker --copy --notify
